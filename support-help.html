<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tick Scanner App — Support</title>
    <style>
        :root {
            --bg: #f4f7f4;
            --card: #ffffff;
            --text: #1a2e1a;
            --muted: #5c6b5c;
            --accent: #2d6a4f;
            --accent-soft: #d8f3dc;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.55;
        }
        .wrap {
            width: 100%;
            max-width: 420px;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 4px 24px rgba(45, 106, 79, 0.08), 0 1px 3px rgba(0, 0, 0, 0.06);
        }
        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 6px 12px;
            border-radius: 999px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            margin: 0 0 12px;
            letter-spacing: -0.02em;
        }
        .lead {
            margin: 0 0 28px;
            color: var(--muted);
            font-size: 1rem;
        }
        a.mail {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            font-size: 1.05rem;
            padding: 14px 18px;
            border-radius: 12px;
            background: var(--accent-soft);
            transition: background 0.2s, transform 0.15s;
        }
        a.mail:hover {
            background: #b7e4c7;
            transform: translateY(-1px);
        }
        a.mail:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
        .hint {
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <span class="badge">Help</span>
            <h1>Tick Scanner support</h1>
            <p class="lead">Questions or feedback? Send us an email — we read every message.</p>
            <a class="mail" href="mailto:branchuk.d@gmail.com?subject=Tick%20Scanner%20App%20Support">branchuk.d@gmail.com</a>
            <p class="hint">We usually reply within a few business days.</p>
        </div>
    </div>
</body>
</html>
